name: aplikasi_perpustakaan
description: Aplikasi Perpustakaan Kejaksaan Negeri
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0

  camera: ^0.11.0
  google_mlkit_face_detection: ^0.7.0
  image_picker: ^1.0.7

  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  shared_preferences: ^2.2.2

  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.2

  intl: ^0.18.1
  webview_flutter: ^4.13.1

  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo_kejaksaan.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_kejaksaan.png"